<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Drei aufgefächerte Flyer im 2fox4-Designsystem">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#070707"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#1a1a1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paperFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdfdfd"/>
      <stop offset="100%" stop-color="#e7e7e7"/>
    </linearGradient>
    <linearGradient id="paperMid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f7f7"/>
      <stop offset="100%" stop-color="#dcdcdc"/>
    </linearGradient>
    <linearGradient id="paperBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ededed"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </linearGradient>
    <linearGradient id="orangeBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff8a5a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="18" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#spot)"/>

  <!-- subtle floor reflection -->
  <ellipse cx="600" cy="630" rx="420" ry="22" fill="#000" opacity="0.55"/>

  <!-- Back flyer (rotated left) -->
  <g transform="translate(290 90) rotate(-12)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="500" rx="6" fill="url(#paperBack)"/>
    <rect x="0" y="0" width="240" height="78" fill="#0a0a0a"/>
    <rect x="20" y="32" width="120" height="14" fill="url(#orangeBar)" rx="2"/>
    <rect x="20" y="54" width="80" height="6" fill="#bfbfbf" rx="1"/>
    <rect x="20" y="110" width="200" height="10" fill="#2a2a2a" rx="2"/>
    <rect x="20" y="130" width="160" height="10" fill="#2a2a2a" rx="2"/>
    <rect x="20" y="170" width="200" height="4" fill="#cfcfcf"/>
    <rect x="20" y="186" width="200" height="4" fill="#cfcfcf"/>
    <rect x="20" y="202" width="160" height="4" fill="#cfcfcf"/>
    <circle cx="120" cy="290" r="55" fill="#0a0a0a"/>
    <circle cx="120" cy="290" r="40" fill="url(#orangeBar)"/>
    <rect x="20" y="380" width="200" height="6" fill="#cfcfcf"/>
    <rect x="20" y="394" width="180" height="6" fill="#cfcfcf"/>
    <rect x="20" y="450" width="100" height="22" rx="3" fill="url(#orangeBar)"/>
  </g>

  <!-- Middle flyer -->
  <g transform="translate(480 60)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="500" rx="6" fill="url(#paperMid)"/>
    <rect x="0" y="0" width="240" height="180" fill="#0a0a0a"/>
    <rect x="0" y="172" width="240" height="8" fill="url(#orangeBar)"/>
    <text x="20" y="60" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="22" fill="#ff6b35" letter-spacing="2">2FOX4</text>
    <rect x="20" y="80" width="200" height="14" fill="#fff" rx="2"/>
    <rect x="20" y="100" width="160" height="14" fill="#fff" rx="2"/>
    <rect x="20" y="138" width="120" height="8" fill="#ff6b35" rx="1"/>
    <!-- "Image" placeholder -->
    <rect x="20" y="200" width="200" height="120" fill="#1a1a1a" rx="3"/>
    <circle cx="120" cy="255" r="22" fill="url(#orangeBar)"/>
    <path d="M104 268 L120 250 L136 268" stroke="#0a0a0a" stroke-width="3" fill="none"/>
    <!-- body lines -->
    <rect x="20" y="340" width="200" height="4" fill="#999"/>
    <rect x="20" y="352" width="200" height="4" fill="#999"/>
    <rect x="20" y="364" width="160" height="4" fill="#999"/>
    <rect x="20" y="378" width="200" height="4" fill="#999"/>
    <rect x="20" y="390" width="140" height="4" fill="#999"/>
    <!-- CTA -->
    <rect x="20" y="430" width="130" height="34" rx="4" fill="#0a0a0a"/>
    <rect x="32" y="442" width="70" height="10" fill="#ff6b35" rx="1"/>
    <rect x="32" y="456" width="50" height="4" fill="#999"/>
  </g>

  <!-- Front flyer (rotated right) -->
  <g transform="translate(680 110) rotate(11)" filter="url(#shadow)">
    <rect x="0" y="0" width="240" height="500" rx="6" fill="url(#paperFront)"/>
    <rect x="0" y="0" width="240" height="500" rx="6" fill="#0a0a0a"/>
    <text x="20" y="60" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="22" fill="#ff6b35" letter-spacing="2">2FOX4</text>
    <rect x="20" y="90" width="200" height="18" fill="#fff" rx="2"/>
    <rect x="20" y="114" width="170" height="18" fill="#fff" rx="2"/>
    <rect x="20" y="138" width="200" height="18" fill="#ff6b35" rx="2"/>
    <rect x="20" y="180" width="180" height="6" fill="#bbb" rx="1"/>
    <!-- diagonal accent -->
    <path d="M0 250 L240 230 L240 280 L0 300 Z" fill="url(#orangeBar)"/>
    <!-- features -->
    <g transform="translate(20 320)">
      <circle cx="6" cy="6" r="6" fill="#ff6b35"/>
      <rect x="20" y="2" width="160" height="8" fill="#ddd" rx="1"/>
    </g>
    <g transform="translate(20 344)">
      <circle cx="6" cy="6" r="6" fill="#ff6b35"/>
      <rect x="20" y="2" width="140" height="8" fill="#ddd" rx="1"/>
    </g>
    <g transform="translate(20 368)">
      <circle cx="6" cy="6" r="6" fill="#ff6b35"/>
      <rect x="20" y="2" width="170" height="8" fill="#ddd" rx="1"/>
    </g>
    <g transform="translate(20 392)">
      <circle cx="6" cy="6" r="6" fill="#ff6b35"/>
      <rect x="20" y="2" width="150" height="8" fill="#ddd" rx="1"/>
    </g>
    <!-- CTA -->
    <rect x="20" y="440" width="200" height="42" rx="4" fill="url(#orangeBar)"/>
    <rect x="40" y="455" width="120" height="12" fill="#0a0a0a" rx="1"/>
  </g>
</svg>
