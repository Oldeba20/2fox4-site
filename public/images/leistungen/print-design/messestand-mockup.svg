<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="3D-Visualisierung eines modularen Messestands mit Theke, Rückwand und Roll-up im 2fox4-Designsystem">
  <defs>
    <linearGradient id="hallBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="50%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="wallBack" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e0e0e"/>
      <stop offset="50%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <linearGradient id="wallSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a44"/>
      <stop offset="100%" stop-color="#ff5a1f"/>
    </linearGradient>
    <linearGradient id="counterTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#cfcfcf"/>
    </linearGradient>
    <linearGradient id="counterFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <filter id="boothShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="10" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hall background -->
  <rect width="1200" height="700" fill="url(#hallBg)"/>
  <rect width="1200" height="700" fill="url(#spotlight)"/>

  <!-- Floor -->
  <polygon points="0,460 1200,460 1200,700 0,700" fill="url(#floorGrad)"/>
  <!-- Floor grid lines (perspective) -->
  <g stroke="#222" stroke-width="1" opacity="0.6">
    <line x1="0" y1="460" x2="1200" y2="460"/>
    <line x1="-200" y1="700" x2="220" y2="460"/>
    <line x1="0" y1="700" x2="380" y2="460"/>
    <line x1="300" y1="700" x2="520" y2="460"/>
    <line x1="600" y1="700" x2="600" y2="460"/>
    <line x1="900" y1="700" x2="680" y2="460"/>
    <line x1="1200" y1="700" x2="820" y2="460"/>
    <line x1="1400" y1="700" x2="980" y2="460"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Booth ground (isometric) -->
  <polygon points="240,540 960,540 1040,580 200,580" fill="#0a0a0a" stroke="#1d1d1d"/>

  <!-- Back wall (large branded wall) -->
  <g filter="url(#boothShadow)">
    <polygon points="280,160 920,160 920,540 280,540" fill="url(#wallBack)"/>
    <!-- Brand logo block -->
    <rect x="310" y="190" width="160" height="50" fill="#0a0a0a"/>
    <text x="320" y="225" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="26" fill="#ff6b35" letter-spacing="3">2FOX4</text>
    <!-- Big claim -->
    <text x="310" y="295" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="42" fill="#fff" letter-spacing="-1">WIR BAUEN</text>
    <text x="310" y="345" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="42" fill="url(#orangeGrad)" letter-spacing="-1">AUFTRITTE.</text>
    <!-- Diagonal accent -->
    <polygon points="280,370 920,360 920,395 280,405" fill="url(#orangeGrad)"/>
    <text x="310" y="390" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="13" fill="#0a0a0a" letter-spacing="1.5">VON DER WEBSITE BIS ZUR MESSE — AUS SACHSENHAGEN</text>
    <!-- Photo "panel" -->
    <rect x="310" y="425" width="180" height="90" fill="#1a1a1a" stroke="#2a2a2a"/>
    <circle cx="400" cy="465" r="22" fill="url(#orangeGrad)"/>
    <path d="M380 478 L400 458 L420 478" stroke="#0a0a0a" stroke-width="3" fill="none"/>
    <!-- Bullet wall -->
    <g transform="translate(520 430)">
      <rect x="0" y="0" width="8" height="8" fill="#ff6b35"/>
      <rect x="18" y="2" width="160" height="5" fill="#ddd"/>
      <rect x="18" y="12" width="120" height="5" fill="#999"/>
    </g>
    <g transform="translate(520 460)">
      <rect x="0" y="0" width="8" height="8" fill="#ff6b35"/>
      <rect x="18" y="2" width="180" height="5" fill="#ddd"/>
      <rect x="18" y="12" width="140" height="5" fill="#999"/>
    </g>
    <g transform="translate(520 490)">
      <rect x="0" y="0" width="8" height="8" fill="#ff6b35"/>
      <rect x="18" y="2" width="150" height="5" fill="#ddd"/>
      <rect x="18" y="12" width="110" height="5" fill="#999"/>
    </g>
    <!-- URL -->
    <text x="730" y="525" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="14" fill="#ff6b35" letter-spacing="2">2fox4.de</text>
  </g>

  <!-- Right side wall (perspective) -->
  <polygon points="920,160 1010,200 1010,580 920,540" fill="url(#wallSide)" stroke="#1a1a1a"/>
  <rect x="930" y="220" width="70" height="20" fill="#ff6b35" opacity="0.85" transform="skewY(20)"/>

  <!-- Left side wall -->
  <polygon points="280,160 190,200 190,580 280,540" fill="url(#wallSide)" stroke="#1a1a1a"/>
  <rect x="200" y="220" width="70" height="20" fill="#ff6b35" opacity="0.85" transform="skewY(-20)"/>

  <!-- Reception counter (front, isometric) -->
  <g filter="url(#boothShadow)" transform="translate(0 0)">
    <!-- counter body -->
    <polygon points="450,490 750,490 770,540 430,540" fill="url(#counterFront)"/>
    <polygon points="450,490 750,490 770,475 470,475" fill="url(#counterTop)"/>
    <!-- counter front orange stripe -->
    <polygon points="450,510 750,510 750,520 450,520" fill="url(#orangeGrad)"/>
    <!-- counter brand -->
    <text x="568" y="535" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="14" fill="#ff6b35" letter-spacing="2">2FOX4</text>
    <!-- laptop on counter -->
    <rect x="540" y="455" width="60" height="22" fill="#1a1a1a" stroke="#2a2a2a"/>
    <rect x="544" y="459" width="52" height="14" fill="#ff6b35" opacity="0.4"/>
    <polygon points="535,477 605,477 615,485 530,485" fill="#0a0a0a"/>
  </g>

  <!-- Roll-up (left of stand) -->
  <g filter="url(#boothShadow)" transform="translate(120 200)">
    <!-- pole -->
    <rect x="34" y="0" width="2" height="340" fill="#222"/>
    <!-- banner -->
    <rect x="0" y="0" width="70" height="320" fill="#0a0a0a" stroke="#1a1a1a"/>
    <rect x="0" y="0" width="70" height="80" fill="url(#orangeGrad)"/>
    <text x="8" y="46" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="12" fill="#0a0a0a" letter-spacing="2">2FOX4</text>
    <text x="8" y="62" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="7" fill="#0a0a0a" letter-spacing="1">PRINT &amp; MESSE</text>
    <!-- text lines -->
    <rect x="8" y="100" width="54" height="3" fill="#fff"/>
    <rect x="8" y="110" width="40" height="3" fill="#fff"/>
    <rect x="8" y="120" width="50" height="3" fill="#ff6b35"/>
    <!-- icon -->
    <circle cx="35" cy="170" r="18" fill="#0e0e0e" stroke="#ff6b35" stroke-width="1.5"/>
    <path d="M27 170 L33 176 L43 165" stroke="#ff6b35" stroke-width="2" fill="none"/>
    <!-- bullets -->
    <rect x="8" y="220" width="3" height="3" fill="#ff6b35"/>
    <rect x="16" y="220" width="40" height="2" fill="#ddd"/>
    <rect x="8" y="232" width="3" height="3" fill="#ff6b35"/>
    <rect x="16" y="232" width="46" height="2" fill="#ddd"/>
    <rect x="8" y="244" width="3" height="3" fill="#ff6b35"/>
    <rect x="16" y="244" width="32" height="2" fill="#ddd"/>
    <!-- URL -->
    <text x="14" y="290" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="7" fill="#ff6b35" letter-spacing="1">2fox4.de</text>
    <!-- foot -->
    <ellipse cx="35" cy="340" rx="32" ry="4" fill="#0a0a0a"/>
  </g>

  <!-- Roll-up (right of stand) -->
  <g filter="url(#boothShadow)" transform="translate(1010 200)">
    <rect x="34" y="0" width="2" height="340" fill="#222"/>
    <rect x="0" y="0" width="70" height="320" fill="#fafafa" stroke="#ccc"/>
    <rect x="0" y="0" width="70" height="80" fill="#0a0a0a"/>
    <text x="8" y="48" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="14" fill="#ff6b35" letter-spacing="2">2FOX4</text>
    <rect x="8" y="100" width="54" height="3" fill="#0a0a0a"/>
    <rect x="8" y="110" width="40" height="3" fill="#0a0a0a"/>
    <rect x="8" y="120" width="50" height="3" fill="#ff6b35"/>
    <rect x="8" y="150" width="54" height="60" fill="#ededed"/>
    <circle cx="35" cy="180" r="16" fill="url(#orangeGrad)"/>
    <text x="35" y="184" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="14" fill="#0a0a0a" text-anchor="middle">★</text>
    <rect x="8" y="230" width="54" height="3" fill="#666"/>
    <rect x="8" y="238" width="40" height="3" fill="#666"/>
    <rect x="8" y="246" width="48" height="3" fill="#666"/>
    <rect x="8" y="270" width="40" height="14" fill="url(#orangeGrad)"/>
    <text x="14" y="280" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="7" fill="#0a0a0a" letter-spacing="1">MEHR INFOS</text>
    <ellipse cx="35" cy="340" rx="32" ry="4" fill="#0a0a0a"/>
  </g>

  <!-- People silhouettes -->
  <g opacity="0.85">
    <!-- Person 1 (left of counter) -->
    <ellipse cx="380" cy="488" r="11" fill="#1f1f1f"/>
    <path d="M369 498 Q380 540 391 498 L391 560 L369 560 Z" fill="#161616"/>
    <ellipse cx="380" cy="565" rx="15" ry="3" fill="#000"/>

    <!-- Person 2 (right side) -->
    <ellipse cx="830" cy="478" r="10" fill="#222"/>
    <path d="M820 487 Q830 528 840 487 L840 555 L820 555 Z" fill="#1a1a1a"/>
    <ellipse cx="830" cy="560" rx="14" ry="3" fill="#000"/>
  </g>

  <!-- Ceiling truss hint -->
  <g opacity="0.5">
    <line x1="240" y1="120" x2="960" y2="120" stroke="#333" stroke-width="2"/>
    <line x1="240" y1="120" x2="240" y2="160" stroke="#333" stroke-width="2"/>
    <line x1="960" y1="120" x2="960" y2="160" stroke="#333" stroke-width="2"/>
    <!-- spot lights -->
    <circle cx="400" cy="130" r="6" fill="#ff6b35" opacity="0.8"/>
    <circle cx="600" cy="130" r="6" fill="#ff6b35" opacity="0.8"/>
    <circle cx="800" cy="130" r="6" fill="#ff6b35" opacity="0.8"/>
  </g>
</svg>
