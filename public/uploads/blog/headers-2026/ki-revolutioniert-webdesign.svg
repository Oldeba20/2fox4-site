  <line x1="80" y1="485" x2="240" y2="485" stroke="#ff6b35" stroke-width="3"/>
  <text x="80" y="540" font-family="-apple-system, sans-serif" font-size="18" fill="#cccccc">2FOX4 · Trends, Tools, Praxis-Tipps</text>
