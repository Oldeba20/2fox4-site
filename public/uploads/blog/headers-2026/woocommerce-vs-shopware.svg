<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="WooCommerce vs Shopware Vergleich 2026">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2230"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- VS-Layout: zwei Plattform-Karten + zentrales VS -->
  <!-- Karte WooCommerce -->
  <g>
    <rect x="80" y="280" width="380" height="240" rx="14" fill="#1f2937" stroke="#374151" stroke-width="2"/>
    <text x="270" y="335" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="2" fill="#9ca3af" text-anchor="middle">PLUGIN-BASIS</text>
    <text x="270" y="395" font-family="-apple-system, sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle">WooCommerce</text>
    <line x1="200" y1="420" x2="340" y2="420" stroke="#ff6b35" stroke-width="3"/>
    <text x="270" y="460" font-family="-apple-system, sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">+ WordPress · weltweit verbreitet</text>
    <text x="270" y="486" font-family="-apple-system, sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">+ flexibel · großes Plugin-Ökosystem</text>
  </g>

  <!-- Zentrales VS -->
  <g>
    <circle cx="600" cy="400" r="58" fill="#0d1117" stroke="#ff6b35" stroke-width="4"/>
    <text x="600" y="416" font-family="-apple-system, sans-serif" font-size="36" font-weight="900" fill="#ff6b35" text-anchor="middle">vs.</text>
  </g>

  <!-- Karte Shopware -->
  <g>
    <rect x="740" y="280" width="380" height="240" rx="14" fill="#1f2937" stroke="#374151" stroke-width="2"/>
    <text x="930" y="335" font-family="-apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="2" fill="#9ca3af" text-anchor="middle">DEDIZIERTES CMS</text>
    <text x="930" y="395" font-family="-apple-system, sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle">Shopware 6</text>
    <line x1="860" y1="420" x2="1000" y2="420" stroke="#ff6b35" stroke-width="3"/>
    <text x="930" y="460" font-family="-apple-system, sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">+ E-Commerce-Fokus pur</text>
    <text x="930" y="486" font-family="-apple-system, sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">+ B2B-tauglich · made in Germany</text>
  </g>

  <!-- Headline oben -->
  <text x="600" y="120" font-family="-apple-system, sans-serif" font-size="20" font-weight="600" letter-spacing="3" fill="#ff6b35" text-anchor="middle">SHOPSYSTEM-VERGLEICH 2026</text>
  <text x="600" y="190" font-family="-apple-system, sans-serif" font-size="48" font-weight="800" fill="#ffffff" text-anchor="middle">Welches System gewinnt?</text>
  <text x="600" y="230" font-family="-apple-system, sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Eine ehrliche Analyse für Mittelständler und KMU.</text>

  <!-- Footer -->
  <text x="600" y="585" font-family="-apple-system, sans-serif" font-size="16" fill="#cccccc" text-anchor="middle">2FOX4 · 18 Jahre Onlineshop-Erfahrung</text>
</svg>
