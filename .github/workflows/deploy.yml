name: Build & Deploy zu All-Inkl

# Trigger: jeder Push auf main + manuell aus dem Actions-Tab + nightly
# Der Cron-Trigger (04:15 UTC = 05:15/06:15 deutsch je nach DST) baut die
# Site neu, damit Posts mit zukünftigem `date`-Frontmatter ab ihrem
# Veröffentlichungs-Datum automatisch live gehen (Scheduled Publishing).
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          # Volle Git-History, damit die Sitemap ehrliche lastmod-Daten
          # (echtes letztes Commit-Datum je Quelldatei) erzeugen kann.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check build dir
        run: |
          test -d /tmp/astro-dist || (echo Build failed; exit 1)
          echo Files: $(find /tmp/astro-dist -type f | wc -l)
      - name: Deploy via lftp + sshpass
        env:
          H: ${{ secrets.SSH_HOST }}
          U: ${{ secrets.SSH_USER }}
          P: ${{ secrets.SSH_PASSWORD }}
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          R: /www/htdocs/w0202caa/2fox4
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp sshpass
          # WICHTIG: KEIN --delete. Stale Astro-Assets bleiben (hash-basiert,
          # nehmen nur Disk-Platz, brechen aber nichts). --delete loescht
          # auch Server-only Verzeichnisse wie /blockagent/ — ein Disaster.
          lftp -e "set sftp:auto-confirm yes; set sftp:connect-program 'sshpass -e ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'; open -u '$U','$P' sftp://$H; mirror -R -v --only-newer --parallel=5 --exclude-glob='.htaccess' --exclude-glob='kontakt.config.php' --exclude-glob='ki-check.config.php' /tmp/astro-dist/ $R/; bye"
      - name: Smoke test
        run: |
          s=$(curl -s -o /dev/null -w '%{http_code}' https://www.2fox4.de/)
          [ "$s" = '200' ] || (echo Homepage not OK: $s; exit 1)
          echo OK
