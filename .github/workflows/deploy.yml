name: Build & Deploy zu All-Inkl

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check build dir
        run: |
          test -d /tmp/astro-dist || (echo Build failed; exit 1)
          echo Files: $(find /tmp/astro-dist -type f | wc -l)
      - name: Deploy via lftp + sshpass
        env:
          H: ${{ secrets.SSH_HOST }}
          U: ${{ secrets.SSH_USER }}
          P: ${{ secrets.SSH_PASSWORD }}
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          R: /www/htdocs/w0202caa/2fox4
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp sshpass
          lftp -e "set sftp:auto-confirm yes; set sftp:connect-program 'sshpass -e ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'; open -u '$U','$P' sftp://$H; mirror -R -v --only-newer --exclude-glob='.htaccess' --exclude-glob='kontakt.config.php' /tmp/astro-dist/ $R/; bye"
      - name: Smoke test
        run: |
          s=$(curl -s -o /dev/null -w '%{http_code}' https://www.2fox4.de/)
          [ "$s" = '200' ] || (echo Homepage not OK: $s; exit 1)
          echo OK
