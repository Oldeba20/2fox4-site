name: Build & Deploy zu All-Inkl

# Trigger: jeder Push auf main + manuell aus dem Actions-Tab
on:
  push:
    branches: [main]
  workflow_dispatch:

# Nur ein Deploy gleichzeitig — verhindert Race Conditions auf dem SFTP-Target
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20 Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependencies installieren
        run: npm ci

      - name: Astro bauen
        run: npm run build
        # outDir ist in astro.config.mjs auf /tmp/astro-dist gesetzt.

      - name: Build-Verzeichnis prüfen
        run: |
          if [ ! -d /tmp/astro-dist ]; then
            echo "::error::/tmp/astro-dist existiert nicht — Astro-Build ist fehlgeschlagen"
            exit 1
          fi
          echo "Generated files: $(find /tmp/astro-dist -type f | wc -l)"

      - name: Deploy via SFTP (LFTP)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          REMOTE_PATH: /www/htdocs/w0202caa/2fox4
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "$SSH_USER","$SSH_PASSWORD" -e "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            mirror --reverse --delete --verbose=1 \
              --exclude-glob='.htaccess' \
              --exclude-glob='kontakt.config.php' \
              --exclude-glob='lib/' \
              --exclude-glob='_archive-*/' \
              --exclude-glob='dev/' \
              --exclude-glob='akquise-system/' \
              --exclude-glob='reviews/cache/' \
              /tmp/astro-dist/ $REMOTE_PATH/;
            bye
          " sftp://$SSH_HOST

      - name: Smoke-Test (HTTP 200 auf Homepage)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://www.2fox4.de/)
          if [ "$status" != "200" ]; then
            echo "::error::Homepage ist nicht erreichbar — HTTP $status"
            exit 1
          fi
          echo "Homepage liefert HTTP 200 ✓"
