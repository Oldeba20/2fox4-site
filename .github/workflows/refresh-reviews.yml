name: Refresh Google Reviews

# Holt jede Nacht die fünf neuesten Google-Bewertungen über die Places API
# und commited reviews.json + neue Avatare, FALLS sich etwas geändert hat.
# Der Commit triggert automatisch den Build & Deploy Workflow (push auf main).
#
# Trigger:
#   - schedule:           täglich 03:00 UTC (vor dem 04:15-UTC-Nightly-Build)
#   - workflow_dispatch:  manuell aus dem Actions-Tab
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-reviews
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write   # damit der GITHUB_TOKEN pushen darf
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest reviews
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node scripts/refresh-reviews.mjs

      - name: Commit & push (only if changed)
        run: |
          if [[ -z "$(git status --porcelain src/data/reviews.json public/reviews/)" ]]; then
            echo "Keine Änderungen — nichts zu committen."
            exit 0
          fi
          git config user.email "deppe.oliver@gmail.com"
          git config user.name  "2fox4 review-bot"
          git add src/data/reviews.json public/reviews/
          git commit -m "chore(reviews): aktualisiere Google-Bewertungen ($(date -u +%Y-%m-%d))"
          git push
